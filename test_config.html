<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API配置测试</title>
</head>
<body>
    <h1>API配置测试</h1>
    <button onclick="testConfig()">测试API配置</button>
    <div id="result"></div>

    <script src="script.js"></script>
    <script>
        function testConfig() {
            const resultDiv = document.getElementById('result');
            
            // 显示配置信息
            console.log('测试API配置...');
            showConfig();
            
            // 检查配置
            const configValid = checkAPIConfig();
            
            resultDiv.innerHTML = `
                <h3>配置检查结果：</h3>
                <p>风格分析密钥：${API_CONFIG.FASTGPT_STYLE.apiKey ? '✅ 已配置' : '❌ 未配置'}</p>
                <p>内容生成密钥：${API_CONFIG.FASTGPT_CONTENT.apiKey ? '✅ 已配置' : '❌ 未配置'}</p>
                <p>配置状态：${configValid ? '✅ 完整' : '❌ 不完整'}</p>
            `;
        }
    </script>
</body>
</html>
